name: BuildMatrix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-2019
    steps:
      - uses: actions/checkout@v3
      - name: write config
        run: |
          mkdir -p ~/.ssh
          echo "${{secrets.SDF_SSH_CONFIG}}" > ~/.ssh/config
          git config --global core.compression 9 
          # git config --global core.packedGitLimit  2048M
          git config --global core.packedGitWindowSize   2048M
          git config --global pack.deltaCacheSize   2048M
          git config --global pack.packSizeLimit    2048M
          git config --global pack.windowMemory     2048M
          git config --global http.postBuffer 2048M
          git config --global http.maxRequestBuffer 2048M
      - name: checkout repo_sdf_by
        uses: actions/checkout@v3
        with:
          ref: develop
          path: sdf_by_dir
          repository: "${{secrets.SDF_BY_REPO}}"
          token: ${{ secrets.SDF_TOKEN }}
          fetch-depth: 1
          ssh-key: "${{secrets.SDF_SSH_KEY}}"
          submodules: true
      - name: Run builder
        shell: pwsh
        run: |
          ssh -V
          python -V
          git version
          dir && cd sdf_by_dir && python build.py
        
  ubuntu-build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v3
      - name: write config
        run: |
          mkdir -p ~/.ssh
          echo "${{secrets.SDF_SSH_CONFIG}}" > ~/.ssh/config
          git config --global core.compression 9 
          # git config --global core.packedGitLimit  2048M
          git config --global core.packedGitWindowSize   2048M
          git config --global pack.deltaCacheSize   2048M
          git config --global pack.packSizeLimit    2048M
          git config --global pack.windowMemory     2048M
          git config --global http.postBuffer 2048M
          git config --global http.maxRequestBuffer 2048M
      - name: checkout repo_sdf_by
        uses: actions/checkout@v3
        with:
          ref: develop
          path: sdf_by_dir
          repository: "${{secrets.SDF_BY_REPO}}"
          token: ${{ secrets.SDF_TOKEN }}
          fetch-depth: 1
          ssh-key: "${{secrets.SDF_SSH_KEY}}"
          submodules: true
      - name: Run builder
        shell: pwsh
        run: |
          ssh -V
          python -V
          git version
          dir && cd sdf_by_dir && sudo python3 build.py
          

